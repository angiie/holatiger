name: Deploy to Vercel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --no-audit --no-fund || npm i --no-audit --no-fund

      - name: Pull Vercel Environment Information
        run: |
          npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: |
          npm run build
          echo "Copying dist to .vercel/output for prebuilt deployment"
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          
          # Create config.json for Vercel Build Output API v3
          cat > .vercel/output/config.json << 'CONFIG'
          {
            "version": 3,
            "routes": [
              {
                "src": "/webdavy",
                "dest": "/webdavy.html"
              },
              {
                "src": "/tinypass",
                "dest": "/tinypass.html"
              },
              {
                "src": "/svg-studio",
                "dest": "/svg-studio.html"
              },
              {
                "src": "/tinypic",
                "dest": "/tinypic/index.html"
              },
              {
                "src": "/banana",
                "dest": "/banana/index.html"
              },
              {
                "src": "/lexa",
                "dest": "/lexa.html"
              },
              {
                "src": "/ezpixy",
                "dest": "/ezpixy.html"
              },
              {
                "src": "/text-to-png",
                "dest": "/text-to-png.html"
              },
              {
                "src": "/faq",
                "dest": "/faq.html"
              },
              {
                "src": "/blog",
                "dest": "/blog.html"
              },
              {
                "src": "/compress-jpeg-online",
                "dest": "/compress-jpeg-online.html"
              },
              {
                "src": "/tinypic-vs-squoosh",
                "dest": "/tinypic-vs-squoosh.html"
              },
              {
                "src": "/webdav-chrome-setup",
                "dest": "/webdav-chrome-setup.html"
              },
              {
                "src": "/webdavy-vs-raidrive",
                "dest": "/webdavy-vs-raidrive.html"
              },
              {
                "src": "/password-generator",
                "dest": "/password-generator.html"
              },
              {
                "src": "/tinypass-vs-1password",
                "dest": "/tinypass-vs-1password.html"
              },
              {
                "src": "/svg-to-png",
                "dest": "/svg-to-png.html"
              },
              {
                "src": "/svg-studio-vs-inkscape",
                "dest": "/svg-studio-vs-inkscape.html"
              },
              {
                "src": "/text-to-image",
                "dest": "/text-to-image.html"
              },
              {
                "src": "/ai-fashion-model",
                "dest": "/ai-fashion-model.html"
              },
              {
                "src": "/ezpixy-vs-midjourney",
                "dest": "/ezpixy-vs-midjourney.html"
              },
              {
                "src": "/remove-gemini-watermark",
                "dest": "/remove-gemini-watermark.html"
              },
              {
                "src": "/banana-vs-adobe-firefly",
                "dest": "/banana-vs-adobe-firefly.html"
              },
              {
                "src": "/svg-to-png-workflow",
                "dest": "/blog-svg-to-png-workflow.html"
              },
              {
                "src": "/tinypass-password-guide",
                "dest": "/blog-tinypass-password-guide.html"
              },
              {
                "src": "/webdav-chrome-setup-blog",
                "dest": "/blog-webdav-chrome-setup.html"
              }
            ]
          }
          CONFIG

      - name: Verify build output
        run: |
          echo "Checking .vercel/output/static directory contents:"
          ls -la .vercel/output/static/
          echo "Checking assets/js directory:"
          ls -la .vercel/output/static/assets/js/
          echo "Checking if HTML contains language options:"
          grep -c "Français\|Español\|العربية" .vercel/output/static/index.html || echo "Language options not found"
          echo "Checking config.json:"
          cat .vercel/output/config.json

      - name: Deploy to Vercel (Production)
        run: |
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
