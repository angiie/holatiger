      <h1>HolaTiger 虎啦 · 6 款隐私优先的个人工具</h1>
      <p>HolaTiger 是一组"默认本地处理、保护隐私"的浏览器扩展和在线工具集合。无需注册，无追踪，开箱即用。</p>
      <h2>产品清单</h2>
      <ul>
        <li><a href="/tinypic.html">Tiny Pic</a> - 浏览器端 WASM 批量图片压缩（PNG / JPEG / WebP），本地运行，文件不离开设备。</li>
        <li><a href="/webdavy.html">WebDavy</a> - Chrome 扩展，把 WebDAV 云盘（Nextcloud / 坚果云 / 群晖等）接入浏览器。</li>
        <li><a href="/tinypass.html">TinyPass</a> - 高强度密码生成器，支持长度、字符集、批量、可读模式。</li>
        <li><a href="/svg-studio.html">SVG Studio Pro</a> - 在线 SVG 查看器与 PNG / PDF / ICO 多格式导出工具。</li>
        <li><a href="/text-to-png.html">Text to PNG</a> - 把文字一键导出为 PNG 图片（社交媒体封面、表情包）。</li>
        <li><a href="/ezpixy.html">ezpixy</a> - 面向电商卖家的 AI 商品图工作台：模特图、虚拟试衣、白底图。</li>
      </ul>
      <h2>技术理念</h2>
      <p>所有客户端工具默认在浏览器中本地运行，文件不经过我们的服务器。AI 工具（ezpixy）只上传用户主动提交的图片，用于模型推理，不会用于训练。</p>
